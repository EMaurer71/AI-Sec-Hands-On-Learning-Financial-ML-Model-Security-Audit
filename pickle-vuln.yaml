rules:
  - id: unsafe-pickle-load
    pattern: pickle.load($ARG)
    message: "pickle.load() without validation"
    languages: [python]
    severity: ERROR

  - id: unsafe-pickle-loads
    pattern: pickle.loads($ARG)
    message: "pickle.loads() on dynamic data"
    languages: [python]
    severity: ERROR

  - id: pickle-load-user-controlled-path
    patterns:
      - pattern: pickle.load(open($PATH, ...))
      - metavariable-pattern:
          metavariable: $PATH
          pattern: $BASE + $USER_INPUT
    message: "User-controlled path passed to pickle.load()"
    languages: [python]
    severity: ERROR

  - id: unsafe-joblib-load
    pattern: joblib.load($ARG)
    message: "joblib.load() uses pickle internally"
    languages: [python]
    severity: WARNING

  - id: unsafe-keras-load-model
    pattern: tf.keras.models.load_model($ARG)
    message: "tf.keras.models.load_model() without integrity checks"
    languages: [python]
    severity: WARNING

