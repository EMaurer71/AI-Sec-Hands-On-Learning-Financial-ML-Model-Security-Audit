rules:
  - id: hardcoded-api-key
    pattern: $VAR = "$VALUE"
    languages: [python]
    severity: ERROR
    metavariable-regex:
      metavariable: $VAR
      regex: (?i)(key|token|secret|password|passwd|aws|connection)

  - id: hardcoded-aws-credentials
    pattern: $VAR = "AKIA$REST"
    languages: [python]
    severity: ERROR

  - id: hardcoded-db-connection-string
    pattern: $VAR = "postgresql://$REST"
    languages: [python]
    severity: WARNING

  - id: hardcoded-jwt-token
    pattern: $VAR = "Bearer $REST"
    languages: [python]
    severity: WARNING

